<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: dynamic(~{::main})}">
<body>
    <main>
        <div class="row mt-4">
            <div class="col-md-7 mb-4">
                <div class="clean-card h-100 p-4">
                    <h5 class="text-primary-clean fw-bold mb-4 border-bottom pb-3">
                        <i class="fas fa-map-marker-alt me-2"></i> THÔNG TIN GIAO HÀNG
                    </h5>
                    
                    <form th:action="@{/order/purchase}" method="post" th:object="${order}">
                        <div class="mb-3">
                            <label class="text-muted small fw-bold mb-1">Người nhận</label>
                            <input type="text" th:value="${session.user.fullname}" class="form-control bg-light" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small fw-bold mb-1">Địa chỉ nhận hàng</label>
                            <textarea th:field="*{address}" rows="3" class="form-control" placeholder="Nhập số nhà, tên đường, phường/xã..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="text-muted small fw-bold mb-1">Số điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại liên hệ" required>
                        </div>
                        
                        <div class="mt-auto">
                            <button class="btn btn-accent-clean w-100 py-3 text-uppercase shadow-lg">
                                <i class="fas fa-paper-plane me-2"></i> Xác nhận đặt hàng
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="clean-card h-100 p-4 bg-light-clean border-0">
                    <h5 class="text-main fw-bold mb-4 border-bottom pb-3">
                        <i class="fas fa-receipt me-2 text-muted"></i> ĐƠN HÀNG CỦA BẠN
                    </h5>
                    
                    <div class="list-group list-group-flush bg-transparent">
                        <div th:each="item : ${cart.items}" class="list-group-item bg-transparent d-flex justify-content-between align-items-center px-0 py-3">
                            <div>
                                <div class="fw-bold text-main">[[${item.name}]]</div>
                                <small class="text-muted">Số lượng: [[${item.qty}]]</small>
                            </div>
                            <span class="fw-bold text-primary-clean">[[${#numbers.formatDecimal(item.price * item.qty, 0, 'COMMA', 0, 'POINT')}]] ₫</span>
                        </div>
                    </div>
                    
                    <div class="border-top border-2 mt-3 pt-3">
                        <div class="d-flex justify-content-between fs-5 fw-bold">
                            <span class="text-main">Tổng cộng:</span>
                            <span class="price-text">[[${#numbers.formatDecimal(cart.amount, 0, 'COMMA', 0, 'POINT')}]] ₫</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
