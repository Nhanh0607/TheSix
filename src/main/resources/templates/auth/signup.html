<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: dynamic(~{::main})}">
<body>
    <main>
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="clean-card p-5">
                    <h3 class="text-center text-primary-clean mb-4 fw-bold">
                        TẠO TÀI KHOẢN
                    </h3>
                    
                    <div th:if="${message != null}" class="alert alert-warning mb-3">
                        [[${message}]]
                    </div>

                    <form th:action="@{/auth/signup}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="text-muted small fw-bold">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small fw-bold">Họ và tên</label>
                            <input type="text" th:field="*{fullname}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small fw-bold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small fw-bold">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="text-muted small fw-bold">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>
                        
                        <button class="btn btn-primary-clean w-100 mb-3 text-uppercase">
                            <i class="fas fa-user-plus me-2"></i> Đăng ký
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <span class="text-muted small">Đã có tài khoản?</span>
                        <a href="/auth/login" class="text-primary-clean small fw-bold text-decoration-none">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
