<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: dynamic(~{::main})}"
>
  <body>
    <main>
      <h3 class="fw-bold text-main mb-4">QUẢN LÝ LOẠI HÀNG</h3>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="clean-card h-auto">
            <h5 class="text-primary-clean fw-bold mb-3 border-bottom pb-2">
              Thông tin loại hàng
            </h5>
            <div th:if="${message != null}" class="alert alert-info mb-3 small">
              [[${message}]]
            </div>

            <form
              th:action="@{/admin/category/index}"
              method="post"
              th:object="${item}"
            >
              <div class="mb-3">
                <label class="fw-bold small text-dark">Mã loại (ID)</label>
                <input
                  type="text"
                  th:field="*{id}"
                  class="form-control"
                  placeholder="Ví dụ: LAPTOP"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="fw-bold small text-dark">Tên loại</label>
                <input
                  type="text"
                  th:field="*{name}"
                  class="form-control"
                  placeholder="Ví dụ: Máy tính xách tay"
                  required
                />
              </div>

              <div class="d-grid gap-2">
                <button
                  th:formaction="@{/admin/category/create}"
                  class="btn btn-primary-clean"
                >
                  Thêm
                </button>
                <button
                  th:formaction="@{/admin/category/update}"
                  class="btn btn-outline-clean"
                >
                  Lưu
                </button>
                <a
                  th:if="${item.id != null}"
                  th:href="@{|/admin/category/delete/${item.id}|}"
                  class="btn btn-danger"
                  onclick="return confirm('Xóa loại này?');"
                  >Xóa</a
                >
                <a href="/admin/category/reset" class="btn btn-light border"
                  >Mới</a
                >
              </div>
            </form>
          </div>
        </div>
        <div class="col-md-8">
          <div class="clean-card h-100 p-0">
            <div class="p-3 border-bottom">
              <h5 class="m-0 fw-bold text-dark">Danh sách</h5>
            </div>
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="bg-light-clean">
                  <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Sửa</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="c:${items}">
                    <td>[[${c.id}]]</td>
                    <td class="fw-bold text-main">[[${c.name}]]</td>
                    <td>
                      <a
                        th:href="@{|/admin/category/edit/${c.id}|}"
                        class="btn btn-sm btn-light border rounded-circle"
                        ><i class="fas fa-pen text-primary"></i
                      ></a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
