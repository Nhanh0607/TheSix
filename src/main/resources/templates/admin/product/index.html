<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: dynamic(~{::main})}"
>
  <body>
    <main>
      <h3 class="fw-bold text-main mb-4">QUẢN LÝ SẢN PHẨM</h3>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="clean-card h-auto">
            <h5 class="text-primary-clean fw-bold mb-3 border-bottom pb-2">
              <i class="fas fa-box me-2"></i> Thông tin sản phẩm
            </h5>

            <div th:if="${message != null}" class="alert alert-info mb-3 small">
              <i class="fas fa-info-circle me-1"></i> [[${message}]]
            </div>

            <form
              th:action="@{/admin/product/index}"
              method="post"
              th:object="${item}"
              enctype="multipart/form-data"
            >
              <div class="text-center mb-3">
                <div class="mb-2">
                  <img
                    th:src="@{|/images/*{image}|}"
                    class="rounded border shadow-sm"
                    style="
                      max-height: 120px;
                      max-width: 100%;
                      object-fit: contain;
                    "
                    onerror="
                      this.src = 'https://placehold.co/150x150?text=Xem+trước'
                    "
                  />
                </div>

                <input
                  type="file"
                  name="attach"
                  class="form-control form-control-sm mb-1"
                />

                <input type="hidden" th:field="*{image}" />

                <small class="text-muted fst-italic" th:if="*{image != null}"
                  >File: [[*{image}]]</small
                >
              </div>

              <div class="mb-2">
                <label class="text-muted small fw-bold">Tên sản phẩm</label>
                <input
                  type="text"
                  th:field="*{name}"
                  class="form-control"
                  required
                />
              </div>

              <div class="row mb-2">
                <div class="col-6">
                  <label class="text-muted small fw-bold">Giá</label>
                  <input
                    type="number"
                    th:field="*{price}"
                    class="form-control"
                    required
                    min="0"
                  />
                </div>
                <div class="col-6">
                  <label class="text-muted small fw-bold">Loại</label>
                  <select th:field="*{category.id}" class="form-select">
                    <option th:each="c : ${cates}" th:value="${c.id}">
                      [[${c.name}]]
                    </option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label class="text-muted small fw-bold">Ngày tạo</label>
                <input
                  type="date"
                  th:field="*{createDate}"
                  class="form-control"
                />
              </div>

              <div class="mb-3">
                <label class="d-block text-muted small fw-bold"
                  >Trạng thái</label
                >
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    th:field="*{available}"
                    value="true"
                  />
                  <label class="text-success fw-bold">Còn hàng</label>
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    th:field="*{available}"
                    value="false"
                  />
                  <label class="text-danger fw-bold">Hết hàng</label>
                </div>
              </div>

              <input type="hidden" th:field="*{id}" />

              <div class="d-grid gap-2">
                <div class="d-flex gap-2">
                  <button
                    th:formaction="@{/admin/product/create}"
                    class="btn btn-primary-clean flex-fill"
                  >
                    Thêm
                  </button>
                  <button
                    th:formaction="@{/admin/product/update}"
                    class="btn btn-outline-clean flex-fill"
                  >
                    Lưu
                  </button>
                </div>
                <div class="d-flex gap-2">
                  <a
                    th:if="${item.id != null}"
                    th:href="@{|/admin/product/delete/${item.id}|}"
                    class="btn btn-danger flex-fill"
                    onclick="return confirm('Xóa sản phẩm này?');"
                    >Xóa</a
                  >

                  <a
                    href="/admin/product/reset"
                    class="btn btn-light border flex-fill"
                    >Mới</a
                  >
                </div>
              </div>
            </form>
          </div>
        </div>

        <div class="col-md-8">
          <div class="clean-card h-100 p-0 overflow-hidden">
            <div class="p-3 border-bottom d-flex justify-content-between">
              <h5 class="m-0 fw-bold">Danh sách sản phẩm</h5>
              <span class="badge bg-light text-dark border"
                >[[${items.size()}]] items</span
              >
            </div>
            <div class="table-responsive" style="max-height: 600px">
              <table class="table table-hover mb-0 align-middle">
                <thead class="bg-light-clean sticky-top">
                  <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Tên SP</th>
                    <th>Giá</th>
                    <th>Ngày</th>
                    <th>Sửa</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="p : ${items}">
                    <td>[[${p.id}]]</td>
                    <td>
                      <img
                        th:src="@{|/images/${p.image}|}"
                        width="40"
                        height="40"
                        class="rounded border bg-white"
                        style="object-fit: contain"
                        onerror="
                          this.src = 'https://placehold.co/40x40?text=IMG'
                        "
                      />
                    </td>
                    <td class="fw-bold text-main">[[${p.name}]]</td>
                    <td class="text-danger fw-bold">
                      [[${#numbers.formatDecimal(p.price, 0, 'COMMA', 0,
                      'POINT')}]] ₫
                    </td>
                    <td class="small text-muted">[[${p.createDate}]]</td>
                    <td class="text-center">
                      <a
                        th:href="@{|/admin/product/edit/${p.id}|}"
                        class="btn btn-sm btn-light border rounded-circle shadow-sm"
                      >
                        <i class="fas fa-pen small text-primary"></i>
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
