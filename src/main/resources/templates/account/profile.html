<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: dynamic(~{::main})}"
>
  <body>
    <main>
      <div class="row justify-content-center mt-4">
        <div class="col-md-9 col-lg-8">
          <div class="clean-card p-4 p-md-5">
            <h3 class="text-main mb-4 fw-bold text-center border-bottom pb-3">
              HỒ SƠ CÁ NHÂN
            </h3>

            <ul
              class="nav nav-pills nav-fill mb-4 p-1 bg-dark rounded-pill border shadow-sm"
              id="pills-tab"
              role="tablist"
            >
              <li class="nav-item">
                <button
                  class="nav-link active rounded-pill fw-bold"
                  id="info-tab"
                  data-bs-toggle="pill"
                  data-bs-target="#pills-info"
                >
                  <i class="fas fa-user-circle me-2"></i> Thông tin chung
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link rounded-pill fw-bold text-dark"
                  id="pass-tab"
                  data-bs-toggle="pill"
                  data-bs-target="#pills-pass"
                >
                  <i class="fas fa-key me-2"></i> Đổi mật khẩu
                </button>
              </li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
              <div class="tab-pane fade show active" id="pills-info">
                <div
                  th:if="${message != null}"
                  class="alert alert-success mb-3 shadow-sm border-0"
                >
                  <i class="fas fa-check-circle me-1"></i> [[${message}]]
                </div>

                <form action="/account/update" method="post" class="row g-4">
                  <div class="col-md-4 text-center border-end">
                    <div class="mb-3 d-inline-block position-relative">
                      <img
                        th:src="@{|/images/${user.photo}|}"
                        class="rounded-circle shadow-sm border"
                        width="140"
                        height="140"
                        style="object-fit: cover"
                        onerror="
                          this.src = 'https://placehold.co/150x150?text=User'
                        "
                      />
                    </div>
                    <div class="mb-3">
                      <label class="text-dark small fw-bold"
                        >Tên file ảnh</label
                      >
                      <input
                        type="text"
                        name="photo"
                        th:value="${user.photo}"
                        class="form-control form-control-sm text-center mt-1"
                        placeholder="user.png"
                      />
                    </div>
                  </div>
                  <div class="col-md-8 ps-md-4">
                    <div class="mb-3">
                      <label class="text-dark small fw-bold mb-1"
                        >Tên đăng nhập</label
                      >
                      <input
                        type="text"
                        th:value="${user.username}"
                        class="form-control bg-light"
                        disabled
                      />
                    </div>
                    <div class="mb-3">
                      <label class="text-dark small fw-bold mb-1"
                        >Họ và tên</label
                      >
                      <input
                        type="text"
                        name="fullname"
                        th:value="${user.fullname}"
                        class="form-control"
                      />
                    </div>
                    <div class="mb-4">
                      <label class="text-dark small fw-bold mb-1">Email</label>
                      <input
                        type="email"
                        name="email"
                        th:value="${user.email}"
                        class="form-control"
                      />
                    </div>
                    <div class="text-end">
                      <button class="btn btn-primary-clean px-4">
                        <i class="fas fa-save me-2"></i> Cập nhật hồ sơ
                      </button>
                    </div>
                  </div>
                </form>
              </div>

              <div class="tab-pane fade" id="pills-pass">
                <div
                  th:if="${error_pass != null}"
                  class="alert alert-danger mb-3 shadow-sm border-0"
                >
                  <i class="fas fa-exclamation-triangle me-1"></i>
                  [[${error_pass}]]
                </div>
                <div
                  th:if="${message_pass != null}"
                  class="alert alert-success mb-3 shadow-sm border-0"
                >
                  <i class="fas fa-check-circle me-1"></i> [[${message_pass}]]
                </div>

                <form
                  action="/account/change-password"
                  method="post"
                  class="w-75 mx-auto py-3"
                >
                  <div class="mb-3">
                    <label class="text-dark small fw-bold mb-1"
                      >Mật khẩu hiện tại</label
                    >
                    <input
                      type="password"
                      name="currentPass"
                      class="form-control"
                      required
                    />
                  </div>
                  <hr class="my-4 text-muted opacity-25" />
                  <div class="mb-3">
                    <label class="text-dark small fw-bold mb-1"
                      >Mật khẩu mới</label
                    >
                    <input
                      type="password"
                      name="newPass"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="mb-4">
                    <label class="text-dark small fw-bold mb-1"
                      >Xác nhận mật khẩu mới</label
                    >
                    <input
                      type="password"
                      name="confirmPass"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="text-center">
                    <button
                      class="btn btn-danger px-4 rounded-3 fw-bold shadow-sm"
                    >
                      Đổi mật khẩu ngay
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
